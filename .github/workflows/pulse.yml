name: Pulse

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch: # manual trigger for testing

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run src/cli/index.ts
        env:
          # Lifts the unauthenticated api.github.com rate limit for the
          # Deno and Bun release lookups.
          GITHUB_TOKEN: ${{ github.token }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PULSE_SMTP_URL: ${{ secrets.PULSE_SMTP_URL }}
          PULSE_SUBSCRIBER_EMAIL: ${{ secrets.PULSE_SUBSCRIBER_EMAIL }}
          PULSE_EMAIL_FROM: ${{ secrets.PULSE_EMAIL_FROM }}
