version: 2
updates:
  # The bun ecosystem updates bun.lock alongside package.json; the npm
  # ecosystem edits package.json alone, which breaks --frozen-lockfile.
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 2
      include:
        - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      include:
        - "*"
